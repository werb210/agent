name: agent-ci

on:
  push:
    branches: [main]
  pull_request:

env:
  API_BASE_URL: https://server.boreal.financial

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --include=optional

      - run: npm run typecheck

      - name: Check service readiness
        run: |
          node -e "
            const required = [
              'TWILIO_ACCOUNT_SID',
              'OPENAI_API_KEY',
              'AGENT_API_TOKEN'
            ];
            for (const k of required) {
              if (!process.env[k]) {
                process.exit(1);
              }
            }
          "

      - name: Ensure voice route exists
        run: |
          grep -R 'app.use(\"/voice\"' src/app.ts

      - run: npm run test
