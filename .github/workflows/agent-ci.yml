name: agent-ci

on:
  push:
    branches: [main]
  pull_request:

env:
  API_BASE_URL: https://server.boreal.financial

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --include=optional

      - run: npm run typecheck

      - run: npm run test
