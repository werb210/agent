name: agent-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  API_BASE_URL: https://server.boreal.financial

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --include=optional

      - run: npm run typecheck

      - run: npm run build

      - name: Check service readiness
        run: |
          echo "Checking service readiness..."

          if [ -f "dist/index.js" ]; then
            echo "Build artifact exists"
          else
            echo "Missing build artifact"
            exit 1
          fi

      - run: npm run test
