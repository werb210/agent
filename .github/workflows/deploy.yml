name: Deploy Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build --if-present

      # ---------------------------
      # DEPLOY ONLY IF SECRET EXISTS
      # ---------------------------
      - name: Deploy to Azure
        if: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: your-agent-app-name
          publish-profile: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE }}

      # ---------------------------
      # SAFE SKIP (NO FAILURE)
      # ---------------------------
      - name: Skip deploy
        if: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE == '' }}
        run: echo "Skipping deploy — no Azure publish profile configured."
