name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: ls -la dist

      - name: Validate Azure credentials JSON shape
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          echo "$AZURE_CREDENTIALS" | jq -e '
            has("clientId") and
            has("clientSecret") and
            has("subscriptionId") and
            has("tenantId") and
            has("activeDirectoryEndpointUrl") and
            has("resourceManagerEndpointUrl") and
            has("activeDirectoryGraphResourceId") and
            has("sqlManagementEndpointUrl") and
            has("galleryEndpointUrl") and
            has("managementEndpointUrl")
          ' >/dev/null

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .
