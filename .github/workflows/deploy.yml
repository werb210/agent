name: Deploy Agent

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: test -f dist/index.js && echo "BUILD OK"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: boreal-agent
          publish-profile: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE }}
          package: dist/
