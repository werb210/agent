name: Deploy Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      # ---------------------------
      # SAFE DEPLOY (NO FAIL)
      # ---------------------------
      - name: Deploy to Azure (if configured)
        if: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: your-agent-app-name
          publish-profile: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE }}

      - name: Skip deploy (no config)
        if: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE == '' }}
        run: echo "Skipping Azure deploy — no publish profile set."
