name: Deploy

on:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure commit is from PR merge
        run: |
          if ! git log -1 --pretty=%B | grep -q "Merge pull request"; then
            echo "❌ Direct push to main detected"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "BUILD_ARTIFACT_MISSING"
            exit 1
          fi

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://your-site.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "🚀 Deploying..."
