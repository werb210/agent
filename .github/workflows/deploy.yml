name: Deploy Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HAS_AZURE_PROFILE: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy_package
          mkdir -p deploy_package
          cp -R dist deploy_package/dist
          cp package.json package-lock.json deploy_package/
          cp -R node_modules deploy_package/node_modules

      - name: Deploy to Azure
        if: ${{ env.HAS_AZURE_PROFILE == 'true' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: your-agent-app-name
          publish-profile: ${{ secrets.AZURE_AGENT_PUBLISH_PROFILE }}
          package: deploy_package

      - name: Skip deploy
        if: ${{ env.HAS_AZURE_PROFILE != 'true' }}
        run: echo "Skipping deploy — no publish profile"
