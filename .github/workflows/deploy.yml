# AGENT_DEPLOY_v86_SELFCONTAINED — ship a prebuilt, self-contained bundle
# (dist + production node_modules) so the container never depends on a remote
# Oryx build. Requires App Service setting SCM_DO_BUILD_DURING_DEPLOYMENT=false.
name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.js
          node -e "const s=require('fs').statSync('dist/index.js'); if(!s.size){process.exit(1)}"

      - name: Assemble self-contained runtime bundle
        run: |
          rm -rf release
          mkdir -p release
          cp -r dist package.json package-lock.json release/
          cd release
          npm ci --omit=dev --no-audit --no-fund
          test -f dist/index.js
          test -d node_modules

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: maya-service
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release
