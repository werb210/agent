name: agent-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - name: Run tests
        run: npm run test
        env:
          API_URL: http://localhost:3000
          NODE_ENV: test
